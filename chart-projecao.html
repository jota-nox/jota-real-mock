<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Projeção até a moto</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: transparent;
    width: 600px;
    height: 600px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
  }

  .card {
    width: 600px;
    height: 600px;
    background: #ffffff;
    border-radius: 24px;
    box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.06);
    padding: 32px;
    display: flex;
    flex-direction: column;
  }

  .header { height: 48px; display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0; }
  .title { font-size: 24px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.3px; line-height: 1.1; }
  .subtitle { font-size: 18px; font-weight: 400; color: #9a9a9a; margin-top: 2px; }
  .smile { width: 36px; height: 36px; flex-shrink: 0; }

  .chart-body {
    margin-top: 28px;
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 14px;
    height: 380px;
  }
  .y-axis {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: flex-end;
    color: #9a9a9a;
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  .plot {
    position: relative;
    background:
      linear-gradient(to bottom, transparent 0, transparent calc(100% - 1px), rgba(0,0,0,0.06) 100%),
      repeating-linear-gradient(to bottom, transparent 0, transparent calc(20% - 1px), rgba(0,0,0,0.05) calc(20% - 1px), rgba(0,0,0,0.05) 20%);
  }
  .target-line {
    position: absolute;
    left: 0; right: 0;
    border-top: 2px dashed #F96B5C;
    z-index: 2;
  }
  .target-line .lbl {
    position: absolute;
    top: -24px;
    right: 0;
    background: #F96B5C;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .bars {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    padding: 0 6px;
  }
  .bar {
    width: 28px;
    background: #88E0B5;
    border-radius: 3px 3px 0 0;
    position: relative;
  }
  .bar.last { background: #F9DA4A; }
  .bar .val {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    font-weight: 600;
    color: #1a1a1a;
    white-space: nowrap;
  }
  .x-axis {
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 14px;
    padding-top: 8px;
  }
  .x-axis-labels {
    display: flex;
    justify-content: space-around;
    color: #9a9a9a;
    font-size: 10.5px;
    padding: 0 6px;
  }
  .x-axis-labels span { width: 28px; text-align: center; }

  .footer {
    height: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
    flex-shrink: 0;
  }
  .total { color: #1a1a1a; font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .total span { color: #9a9a9a; font-weight: 400; margin-right: 4px; }
  .brand { color: #c4bfb6; font-size: 11px; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div>
      <div class="title">Projeção até a moto</div>
      <div class="subtitle">Guardando R$ 650 / mês · meta R$ 5.850</div>
    </div>

    </svg>
  </div>

  <div class="chart-body">
    <div class="y-axis">
      <span>R$ 6.000</span>
      <span>R$ 4.500</span>
      <span>R$ 3.000</span>
      <span>R$ 1.500</span>
      <span>0</span>
    </div>
    <div class="plot">
      <!-- Target line at R$ 5.850 = 97.5% of max 6000 → top 2.5% -->
      <div class="target-line" style="bottom: 97.5%"><span class="lbl">Meta · R$ 5.850</span></div>
      <div class="bars">
        <!-- Cumulative R$ 650/mês × 9 meses; max ref 6000 -->
        <div class="bar" style="height: 10.8%"><span class="val">650</span></div>
        <div class="bar" style="height: 21.7%"><span class="val">1.3k</span></div>
        <div class="bar" style="height: 32.5%"><span class="val">1.95</span></div>
        <div class="bar" style="height: 43.3%"><span class="val">2.6k</span></div>
        <div class="bar" style="height: 54.2%"><span class="val">3.25</span></div>
        <div class="bar" style="height: 65.0%"><span class="val">3.9k</span></div>
        <div class="bar" style="height: 75.8%"><span class="val">4.55</span></div>
        <div class="bar" style="height: 86.7%"><span class="val">5.2k</span></div>
        <div class="bar last" style="height: 97.5%"><span class="val">5.85</span></div>
      </div>
    </div>
  </div>

  <div class="x-axis">
    <div></div>
    <div class="x-axis-labels">
      <span>Mai</span>
      <span>Jun</span>
      <span>Jul</span>
      <span>Ago</span>
      <span>Set</span>
      <span>Out</span>
      <span>Nov</span>
      <span>Dez</span>
      <span>Jan</span>
    </div>
  </div>

  <div class="footer">
    <div class="total"><span>9 meses até a moto</span>R$ 5.850</div>
    <div class="brand">www.jota.ai</div>
  </div>
</div>

</body>
</html>
